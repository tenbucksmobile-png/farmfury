function getStoredLevel(idx) {
  try { return JSON.parse(localStorage.getItem(`farmfury_best_${idx}`)) || { score:0, stars:0 }; }
  catch { return { score:0, stars:0 }; }
}

function drawStarShape(g, cx, cy, r, earned) {
  const pts = [];
  for (let i = 0; i < 10; i++) {
    const a = (i * Math.PI / 5) - Math.PI / 2;
    const rad = i % 2 === 0 ? r : r * 0.42;
    pts.push({ x: cx + Math.cos(a) * rad, y: cy + Math.sin(a) * rad });
  }
  if (earned) {
    g.fillStyle(0xF5C542);      g.fillPoints(pts, true);
    g.lineStyle(2.5, 0xC8950E); g.strokePoints(pts, true);
  } else {
    g.fillStyle(0x262626, 0.9); g.fillPoints(pts, true);
    g.lineStyle(2, 0x555555);   g.strokePoints(pts, true);
  }
}

// Generates a closed hill polygon in local graphics coordinates
function genHillPts(x0, x1, baseY, amp, phase) {
  const pts = [{ x: x0, y: VH + 10 }];
  for (let x = x0; x <= x1 + 1; x += 8) {
    const y = baseY
      - amp * Math.sin(x / 170 + phase)
      - amp * 0.45 * Math.sin(x / 80 + phase * 1.6);
    pts.push({ x, y });
  }
  pts.push({ x: x1 + 1, y: VH + 10 });
  return pts;
}

// ─── Block ────────────────────────────────────────────────────────────────────
class Block {

  static _ensureTexture(scene, type, w, h) {
    if (type === 'wood'  && w === 60 && h === 20) return 'wood';
    if (type === 'stone' && w === 60 && h === 30) return 'stone';
    const key = `${type}_${w}x${h}`;
    if (scene.textures.exists(key)) return key;
    const isWood = (type === 'wood');
    const g = scene.make.graphics({ add: false });
    if (isWood) {
      g.fillStyle(0xC4843A); g.fillRect(0,0,w,h);
      g.lineStyle(1.5,0x7A4218); g.strokeRect(1,1,w-2,h-2);
      g.lineStyle(0.8,0x9A5E22,0.55);
      for (let lx = 15; lx < w; lx += 15) g.lineBetween(lx,1,lx,h-1);
    } else {
      g.fillStyle(0x888780); g.fillRect(0,0,w,h);
      g.lineStyle(1.5,0x4E4D4C); g.strokeRect(1,1,w-2,h-2);
      g.lineStyle(0.8,0x696867,0.7);
      const hm = Math.floor(h/2);
      const vs = Math.max(20, Math.floor(w / Math.max(2, Math.round(w/30))));
      g.lineBetween(0,hm,w,hm);
      for (let vx = vs;     vx < w; vx += vs) g.lineBetween(vx,hm,vx,h);
      for (let vx = vs*0.5; vx < w; vx += vs) g.lineBetween(vx,0,vx,hm);
    }
    g.generateTexture(key, w, h); g.destroy();
    return key;
  }

  constructor(scene, x, y, width, height, type) {
    this.scene = scene; this.w = width; this.h = height; this.type = type;
    this.destroyed = false; this.cracked = false;
    const isWood  = (type === 'wood');
    const stdArea = isWood ? 1200 : 1800;
    const area    = width * height;
    this.maxHealth  = (isWood ? 80  : 200) * area / stdArea;
    this.health     = this.maxHealth;
    this.faceColor  = isWood ? 0xC4843A : 0x888780;
    this.edgeColor  = isWood ? 0x7A4218 : 0x4E4D4C;
    this.crackColor = isWood ? 0x3A1A08 : 0x252524;
    const texKey = Block._ensureTexture(scene, type, width, height);
    this.img = scene.matter.add.image(x, y, texKey, null, {
      mass: (isWood ? 10 : 30) * area / stdArea,
      restitution: isWood ? 0.2 : 0.1, friction: 0.8, frictionAir: 0.01, label: type
    });
    if (isWood) this.img.setAngle((Math.random() - 0.5) * 6);
    this.img.body.blockRef = this;
    this.crackGfx = scene.add.graphics().setDepth(4);
    this.hpGfx    = scene.add.graphics().setDepth(6);
    this.redrawHP(); this.sync();
  }

  redrawHP() {
    const g = this.hpGfx, r = Phaser.Math.Clamp(this.health / this.maxHealth, 0, 1);
    g.clear();
    g.fillStyle(0x111111, 0.8); g.fillRect(-this.w/2, 0, this.w, 4);
    g.fillStyle(r > 0.6 ? 0x44DD44 : r > 0.3 ? 0xFFAA00 : 0xFF2222);
    g.fillRect(-this.w/2, 0, this.w * r, 4);
  }

  redrawCracks() {
    const g = this.crackGfx, hw = this.w/2, hh = this.h/2; g.clear();
    g.lineStyle(1.4, this.crackColor, 0.9);
    g.lineBetween(-hw*.5,-hh*.8,hw*.3,hh*.4);
    g.lineBetween(hw*.4,-hh*.55,-hw*.15,hh*.7);
    g.lineBetween(-hw*.2,hh*.2,hw*.55,-hh*.75);
  }

  sync() {
    if (this.destroyed) return;
    const { x, y, rotation } = this.img;
    this.hpGfx.setPosition(x, y - this.h/2 - 10);
    if (this.cracked) this.crackGfx.setPosition(x, y).setRotation(rotation);
  }

  takeDamage(amount) {
    if (this.destroyed) return;
    this.health -= amount;
    if (!this.cracked && this.health < this.maxHealth * 0.5) { this.cracked = true; this.redrawCracks(); }
    this.redrawHP();
    if (this.health <= 0) this.explode();
  }

  explode() {
    if (this.destroyed) return;
    this.destroyed = true;
    const { x, y } = this.img;
    for (let i = 0; i < 5; i++) this.spawnFragment(x, y, i);
    this.scene.events.emit('blockDestroyed', { type: this.type, x, y });
    const img = this.img, cg = this.crackGfx, hg = this.hpGfx, sc = this.scene;
    sc.time.delayedCall(0, () => { img.destroy(); cg.destroy(); hg.destroy(); sc.removeBlock(this); });
  }

  spawnFragment(cx, cy, index) {
    const angle = (Math.PI*2*index/5) + (Math.random()-0.5)*0.9;
    const speed = 55 + Math.random()*115;
    const frag  = { x:cx, y:cy, vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed-65, rot:angle };
    const g     = this.scene.add.graphics().setDepth(7);
    const paint = (alpha, scale) => {
      g.clear(); if (alpha<=.02) return;
      const s = 8*scale;
      g.fillStyle(this.faceColor, alpha); g.fillTriangle(0,-s,-s*.85,s*.85,s*.85,s*.85);
      g.lineStyle(0.8, this.edgeColor, alpha*.55); g.strokeTriangle(0,-s,-s*.85,s*.85,s*.85,s*.85);
    };
    paint(1,1); g.setPosition(cx,cy).setRotation(frag.rot);
    const STEPS=38; let step=0;
    this.scene.time.addEvent({ delay:16, repeat:STEPS, callback:()=>{
      step++; const t=step/STEPS;
      frag.vy+=2.5; frag.x+=frag.vx*.016; frag.y+=frag.vy*.016; frag.rot+=.11;
      g.setPosition(frag.x,frag.y).setRotation(frag.rot); paint(1-t,1-t*.65);
      if (step>=STEPS) g.destroy();
    }});
  }
}

// ─── Animal — base ────────────────────────────────────────────────────────────
class Animal {
  constructor(scene) { this.scene=scene; this.img=null; this.destroyed=false; }
  setVelocity(vx,vy) { this.img.setVelocity(vx,vy); }
  destroy() {
    if (this.destroyed) return;
    this.destroyed = true;
    if (this.img && this.img.active) this.img.destroy();
  }
}

// ─── CluckAnimal ──────────────────────────────────────────────────────────────
class CluckAnimal extends Animal {

  static FA = 0.008;

  constructor(scene, x, y) {
    super(scene);
    this.abilityUsed = false; this._hasLanded = false;
    this.img = scene.matter.add.image(x, y, 'cluck', null);
    this.img.setCircle(18, { mass:8, restitution:0.4, friction:0.5, frictionAir:CluckAnimal.FA, label:'cluck' });
    this.img.setDepth(3);
    this._playLaunchTone(); this._setupAbilityInput(); this._setupContactTimer();
  }

  _playLaunchTone() {
    try {
      const ctx=this.scene.sound.context, osc=ctx.createOscillator(), gain=ctx.createGain();
      osc.type='triangle'; osc.frequency.value=400;
      gain.gain.setValueAtTime(0.3,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.08);
      osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime+0.08);
    } catch(e) {}
  }

  _setupAbilityInput() {
    this._clickHandler = () => this._triggerAbility();
    this.scene.input.once('pointerdown', this._clickHandler);
  }

  _setupContactTimer() {
    this._contactHandler = (event) => {
      if (this.destroyed || this._hasLanded) return;
      const myBody = this.img?.body; if (!myBody) return;
      for (const { bodyA, bodyB } of event.pairs) {
        if (bodyA !== myBody && bodyB !== myBody) continue;
        this._hasLanded = true;
        this.scene.input.off('pointerdown', this._clickHandler);
        this.scene.matter.world.off('collisionstart', this._contactHandler);
        this.scene.time.delayedCall(3000, () => this.destroy());
        break;
      }
    };
    this.scene.matter.world.on('collisionstart', this._contactHandler);
  }

  _triggerAbility() {
    if (this.abilityUsed || this.destroyed || this.scene.launcherDragging) return;
    this.abilityUsed = true;
    const { x, y } = this.img, vel = this.img.body.velocity;
    const speed = Math.hypot(vel.x, vel.y), baseAngle = Math.atan2(vel.y, vel.x);
    this.img.setTint(0xFFFFFF);
    this.scene.time.delayedCall(120, () => { if (!this.destroyed) this.img.clearTint(); });
    const eggSpeed = Math.max(speed * 0.6, 5);
    for (const deg of [-60,-30,0,30,60]) {
      const a = baseAngle + Phaser.Math.DegToRad(deg);
      this._spawnEgg(x, y, Math.cos(a)*eggSpeed, Math.sin(a)*eggSpeed);
    }
  }

  _spawnEgg(x, y, vx, vy) {
    const scene  = this.scene;
    const eggImg = scene.matter.add.image(x, y, 'egg', null);
    eggImg.setCircle(7, { mass:3, restitution:0.3, friction:0.4, frictionAir:0.012, label:'egg' });
    eggImg.setVelocity(vx, vy); eggImg.setDepth(3); eggImg.body.eggRef = true;
    let dead = false;
    const handler = (event) => {
      if (dead) return;
      const eggBody = eggImg.body;
      for (const { bodyA, bodyB } of event.pairs) {
        if (bodyA !== eggBody && bodyB !== eggBody) continue;
        const other = bodyA === eggBody ? bodyB : bodyA;
        if (other.eggRef || other.label === 'cluck') continue;
        const relSpeed = Math.hypot(bodyA.velocity.x-bodyB.velocity.x, bodyA.velocity.y-bodyB.velocity.y);
        if (relSpeed < 2) continue;
        if (other.blockRef instanceof Block) other.blockRef.takeDamage(relSpeed * 1.2);
        if (other.robotRef instanceof Robot) other.robotRef.takeDamage(relSpeed * 1.2);
        scene.scoreManager?.onEggHit(eggImg.x, eggImg.y);
        dead = true;
        scene.matter.world.off('collisionstart', handler);
        this._spawnCrackParticle(eggImg.x, eggImg.y);
        scene.time.delayedCall(0, () => { if (eggImg.active) eggImg.destroy(); });
        break;
      }
    };
    scene.matter.world.on('collisionstart', handler);
  }

  _spawnCrackParticle(x, y) {
    const g = this.scene.add.graphics().setDepth(9);
    const angles = [0,60,120,180,240,300].map(d => Phaser.Math.DegToRad(d));
    let step = 0;
    this.scene.time.addEvent({ delay:18, repeat:9, callback:()=>{
      step++; g.clear(); if (step>=9) { g.destroy(); return; }
      const t=step/9, r=3+step*2.5; g.lineStyle(1.5,0xFFFF99,1-t);
      angles.forEach(a => g.lineBetween(x,y,x+Math.cos(a)*r,y+Math.sin(a)*r));
    }});
  }

  destroy() {
    if (this.destroyed) return;
    this.scene.activeAnimal = null;
    this.scene.input.off('pointerdown', this._clickHandler);
    this.scene.matter.world.off('collisionstart', this._contactHandler);
    if (this.scene.trebuchet) this.scene.trebuchet.draw();
    super.destroy();
  }
}

// ─── Robot ────────────────────────────────────────────────────────────────────
class Robot {

  constructor(scene, x, y) {
    this.scene=scene; this.w=30; this.h=40;
    this.maxHealth=150; this.health=150; this.destroyed=false;
    this.img = scene.matter.add.image(x, y, 'robot', null, {
      mass:20, restitution:0.15, friction:0.7, frictionAir:0.01, label:'robot'
    });
    this.img.setDepth(3); this.img.body.robotRef = this;
    this.hpGfx = scene.add.graphics().setDepth(6);
    this.redrawHP(); this.sync();
  }

  redrawHP() {
    const g=this.hpGfx, r=Phaser.Math.Clamp(this.health/this.maxHealth,0,1);
    g.clear();
    g.fillStyle(0x440000,0.85); g.fillRect(-this.w/2,0,this.w,4);
    g.fillStyle(0xE24B4A);      g.fillRect(-this.w/2,0,this.w*r,4);
  }

  sync() {
    if (this.destroyed) return;
    this.hpGfx.setPosition(this.img.x, this.img.y-this.h/2-10);
  }

  takeDamage(amount) {
    if (this.destroyed) return;
    this.health -= amount; this.redrawHP();
    if (this.health <= 0) this.explode();
  }

  explode() {
    if (this.destroyed) return;
    this.destroyed = true;
    const { x, y } = this.img, scene = this.scene;
    this._playDeathSound();
    const flash = scene.add.graphics().setDepth(10);
    flash.fillStyle(0xFF2222,0.85); flash.fillRect(x-this.w/2,y-this.h/2,this.w,this.h);
    scene.tweens.add({ targets:flash,alpha:0,duration:220,ease:'Power2',onComplete:()=>flash.destroy() });
    for (let i=0;i<6;i++) this.spawnFragment(x,y,i);
    scene.events.emit('robotDestroyed', { x, y });
    const img=this.img, hg=this.hpGfx;
    scene.time.delayedCall(0,()=>{ img.destroy(); hg.destroy(); scene.removeRobot(this); });
  }

  _playDeathSound() {
    try {
      const ctx=this.scene.sound.context;
      const osc=ctx.createOscillator(), gain=ctx.createGain();
      osc.type='sawtooth';
      osc.frequency.setValueAtTime(500, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(150, ctx.currentTime+0.2);
      gain.gain.setValueAtTime(0.18, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.2);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(); osc.stop(ctx.currentTime+0.22);
    } catch(e) {}
  }

  spawnFragment(cx, cy, index) {
    const angle=(Math.PI*2*index/6)+(Math.random()-.5)*.6;
    const speed=55+Math.random()*90;
    const color=index%2===0?0x444441:0xE24B4A;
    const frag={x:cx,y:cy,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed-50};
    const g=this.scene.add.graphics().setDepth(7);
    const paint=(a)=>{ g.clear(); if(a<=.02)return; g.fillStyle(color,a); g.fillRect(-3,-3,6,6); };
    paint(1); g.setPosition(cx,cy);
    const STEPS=31; let step=0;
    this.scene.time.addEvent({ delay:16, repeat:STEPS, callback:()=>{
      step++; const t=step/STEPS;
      frag.vy+=2; frag.x+=frag.vx*.016; frag.y+=frag.vy*.016;
      g.setPosition(frag.x,frag.y); paint(1-t);
      if (step>=STEPS) g.destroy();
    }});
  }
}

// ─── LevelLoader ──────────────────────────────────────────────────────────────
class LevelLoader {

  constructor(scene) {
    this.scene=scene; this.currentIdx=0;
    this.birdsLeft=[]; this._baleGfx=null; this._queueCircles=[];
  }

  loadLevel(idx) {
    this._clearLevel();
    this.currentIdx = ((idx % LEVELS.length) + LEVELS.length) % LEVELS.length;
    if (this.scene.scoreManager) this.scene.scoreManager.initLevel(this.currentIdx);

    const data = LEVELS[this.currentIdx];
    for (const bd of data.blocks)
      this.scene.blocks.push(new Block(this.scene, bd.x, bd.y, bd.w, bd.h, bd.type));

    for (const rd of data.robots) this.scene.spawnRobot(rd.x, rd.y);

    this.birdsLeft = [...data.birds];
    this._buildQueueDisplay();

    this.scene.cameras.main.stopFollow();
    this.scene.cameras.main.setScroll((WW-VW)/2, WH-VH);

    this.scene.trebuchet.armOffset = 0;
    this.scene.trebuchet.draw();
  }

  consumeBird() {
    if (this.birdsLeft.length === 0) return null;
    const type = this.birdsLeft.shift();
    if (this._queueCircles.length > 0) {
      const first = this._queueCircles.shift();
      const cam   = this.scene.cameras.main;
      const tx    = this.scene.trebuchet.LAUNCH_X - cam.scrollX;
      const ty    = this.scene.trebuchet.LAUNCH_Y - cam.scrollY;
      this.scene.tweens.add({
        targets:first, x:tx, y:ty, alpha:0, duration:400, ease:'Sine.easeIn',
        onComplete:()=>first.destroy()
      });
      const BX = 70;
      this._queueCircles.forEach((c,i)=>{
        this.scene.tweens.add({ targets:c, x:BX+14+i*28, duration:300, ease:'Sine.easeOut' });
      });
    }
    if (this.birdsLeft.length === 0 && this._baleGfx) {
      const bale = this._baleGfx;
      this.scene.tweens.add({
        targets:bale, alpha:0, delay:420, duration:200,
        onComplete:()=>{ if(bale.active) bale.destroy(); if(this._baleGfx===bale) this._baleGfx=null; }
      });
    }
    return type;
  }

  get hasMoreBirds() { return this.birdsLeft.length > 0; }

  _clearLevel() {
    if (this.scene.activeAnimal) this.scene.activeAnimal.destroy();
    this.scene.launcherDragging = false;
    for (const b of this.scene.blocks) {
      b.destroyed = true;
      if (b.img      && b.img.active)      b.img.destroy();
      if (b.crackGfx && b.crackGfx.active) b.crackGfx.destroy();
      if (b.hpGfx    && b.hpGfx.active)    b.hpGfx.destroy();
    }
    this.scene.blocks = [];
    for (const r of this.scene.robots) {
      r.destroyed = true;
      if (r.img   && r.img.active)   r.img.destroy();
      if (r.hpGfx && r.hpGfx.active) r.hpGfx.destroy();
    }
    this.scene.robots = [];
    this._destroyQueueDisplay();
    this.birdsLeft = [];
  }

  _destroyQueueDisplay() {
    if (this._baleGfx) { this._baleGfx.destroy(); this._baleGfx = null; }
    for (const c of this._queueCircles) c.destroy();
    this._queueCircles = [];
  }

  _buildQueueDisplay() {
    this._destroyQueueDisplay();
    const scene=this.scene, count=this.birdsLeft.length;
    const BX=70, BY=554, baleW=count*28+14;
    this._baleGfx = scene.add.graphics().setScrollFactor(0).setDepth(20);
    this._baleGfx.fillStyle(0x7A5218); this._baleGfx.fillRect(BX,BY,baleW,18);
    this._baleGfx.lineStyle(1,0x5A3808); this._baleGfx.strokeRect(BX,BY,baleW,18);
    this._baleGfx.lineStyle(1,0x9A6A28,0.6);
    for (let x=BX+8; x<BX+baleW; x+=8) this._baleGfx.lineBetween(x,BY,x,BY+18);
    for (let i=0; i<count; i++) {
      const g=scene.add.graphics().setScrollFactor(0).setDepth(21);

      g.setPosition(BX+14+i*28, BY-12);
      this._queueCircles.push(g);
    }
  }
}

// ─── ScoreManager ─────────────────────────────────────────────────────────────
class ScoreManager {

  constructor(scene) {
    this.scene          = scene;
    this.score          = 0;
    this.robotsDestroyed = 0;
    this.blocksDestroyed = 0;
    this.birdsUsed      = 0;
    this.birdsRemaining = 0;
    this.totalRobots    = 0;
    this._levelEnded    = false;
    this._endTimer      = null;
    this._overlayObjects = [];

    // ── Persistent game HUD ──────────────────────────────────────────
    const z = 20;

    this.levelNameText = scene.add.text(12, 11, '',
      { fontFamily:'monospace', fontSize:'13px', color:'#ffffff', stroke:'#000', strokeThickness:2 })
      .setScrollFactor(0).setDepth(z);

    scene.add.text(VW/2, 5, 'SCORE',
      { fontFamily:'monospace', fontSize:'10px', color:'#999999' })
      .setScrollFactor(0).setDepth(z).setOrigin(0.5, 0);

    this.scoreText = scene.add.text(VW/2, 17, '0',
      { fontFamily:'monospace', fontSize:'26px', color:'#ffffff', stroke:'#000', strokeThickness:3 })
      .setScrollFactor(0).setDepth(z).setOrigin(0.5, 0);

    this._birdHudGfx = scene.add.graphics().setScrollFactor(0).setDepth(z);

    // ── Event listeners ──────────────────────────────────────────────
    scene.events.on('blockDestroyed', ({ type, x, y }) => {
      if (this._levelEnded) return;
      this.blocksDestroyed++;
      this._addScore(type === 'wood' ? 100 : 200, x, y);
    });

    scene.events.on('robotDestroyed', ({ x, y }) => {
      if (this._levelEnded) return;
      this.robotsDestroyed++;
      this._addScore(1000, x, y);
      if (this.totalRobots > 0 && this.robotsDestroyed >= this.totalRobots) {
        this._levelEnded = true;
        this._endTimer = scene.time.delayedCall(2000, () => this._triggerLevelComplete());
      }
    });
  }

  // ── Public ────────────────────────────────────────────────────────────────

  initLevel(idx) {
    if (this._endTimer) { this._endTimer.remove(); this._endTimer = null; }
    this._clearOverlay();
    const data = LEVELS[idx];
    this.score           = 0;
    this.robotsDestroyed = 0;
    this.blocksDestroyed = 0;
    this.birdsUsed       = 0;
    this.birdsRemaining  = data.birds.length;
    this.totalRobots     = data.robots.length;
    this._levelEnded     = false;
    this.levelNameText.setText(`${data.id}  ${data.name}`);
    this._updateScoreText(false);
    this._updateBirdHud();
  }

  onBirdFired() {
    this.birdsUsed++;
    this.birdsRemaining = Math.max(0, this.birdsRemaining - 1);
    this._updateBirdHud();
  }

  onEggHit(x, y) {
    if (this._levelEnded) return;
    this._addScore(50, x, y);
  }

  update() {
    if (this._levelEnded || this.totalRobots === 0) return;
    if (!this.scene.activeAnimal && !this.scene.levelLoader.hasMoreBirds &&
        this.robotsDestroyed < this.totalRobots) {
      this._levelEnded = true;
      this._endTimer = this.scene.time.delayedCall(1500, () => this._triggerLevelFailed());
    }
  }

  cleanup() {
    if (this._endTimer) { this._endTimer.remove(); this._endTimer = null; }
    this._clearOverlay();
  }

  // ── Private ───────────────────────────────────────────────────────────────

  _addScore(pts, x, y) {
    this.score += pts;
    this._updateScoreText(true);
    const cam = this.scene.cameras.main;
    const sx  = Phaser.Math.Clamp(x - cam.scrollX, 40, VW - 40);
    const sy  = Phaser.Math.Clamp(y - cam.scrollY, 60, VH - 60);
    const t = this.scene.add.text(sx, sy, `+${pts}`, {
      fontFamily:'monospace', fontSize:'18px', color:'#FFD700',
      stroke:'#000000', strokeThickness:3
    }).setScrollFactor(0).setDepth(25).setOrigin(0.5, 0.5);
    this.scene.tweens.add({
      targets:t, y:sy-55, alpha:0, duration:950, ease:'Power2',
      onComplete:()=>t.destroy()
    });
  }

  _updateScoreText(animate) {
    this.scoreText.setText(this.score.toLocaleString());
    if (animate) {
      this.scene.tweens.add({
        targets:this.scoreText, scaleX:1.35, scaleY:1.35,
        duration:80, ease:'Power2', yoyo:true
      });
    }
  }

  _updateBirdHud() {
    const g = this._birdHudGfx; g.clear();
    const count = Math.min(this.birdsRemaining, 8);
    const r=9, sp=22;
    for (let i=0; i<count; i++) {
      const cx = VW - 14 - r - i*sp, cy = 30;
      g.fillStyle(0xF5C542);      g.fillCircle(cx, cy, r);
      g.lineStyle(1.5, 0xC8950E); g.strokeCircle(cx, cy, r);
      g.fillStyle(0xFF8C00);      g.fillTriangle(cx+6, cy-2, cx+13, cy+1, cx+6, cy+3);
    }
  }

  _calcStars() {
    if (this.robotsDestroyed < this.totalRobots) return 0;
    if (this.birdsRemaining >= 2) return 3;
    if (this.birdsRemaining >= 1) return 2;
    return 1;
  }

  _saveStored(idx, score, stars) {
    const curr = getStoredLevel(idx);
    const best = { score: Math.max(curr.score, score), stars: Math.max(curr.stars, stars) };
    try { localStorage.setItem(`farmfury_best_${idx}`, JSON.stringify(best)); } catch {}
  }

  _triggerLevelComplete() {
    const bonus = this.birdsRemaining * 500;
    this.score += bonus;
    this._updateScoreText(true);
    const idx     = this.scene.levelLoader.currentIdx;
    const oldBest = getStoredLevel(idx);
    const stars   = this._calcStars();
    this._saveStored(idx, this.score, stars);
    const isNewBest = this.score > oldBest.score;
    const bestScore = Math.max(oldBest.score, this.score);
    this._showLevelComplete(stars, this.score, bestScore, isNewBest);
  }

  _triggerLevelFailed() { this._showLevelFailed(); }

  _showLevelComplete(stars, score, bestScore, isNewBest) {
    this._clearOverlay();
    const scene = this.scene;
    scene.inputBlocked = true;
    const O = this._overlayObjects;

    const bg = scene.add.graphics().setScrollFactor(0).setDepth(30);
    bg.fillStyle(0x000000, 0.62); bg.fillRect(0, 0, VW, VH);
    O.push(bg);

    O.push(scene.add.text(VW/2, 78, 'Level Complete!', {
      fontFamily:'monospace', fontSize:'34px', color:'#FF8C00', stroke:'#000', strokeThickness:4
    }).setOrigin(0.5, 0).setScrollFactor(0).setDepth(31));

    const sg = scene.add.graphics().setScrollFactor(0).setDepth(31);
    for (let i=0; i<3; i++) drawStarShape(sg, VW/2+(i-1)*90, 190, 32, i < stars);
    O.push(sg);

    const bonus = this.birdsRemaining;
    const hasBonus = bonus > 0;
    if (hasBonus) {
      O.push(scene.add.text(VW/2, 244, `+${bonus} bird${bonus>1?'s':''} remaining  × 500 bonus`, {
        fontFamily:'monospace', fontSize:'13px', color:'#88EE88'
      }).setOrigin(0.5, 0).setScrollFactor(0).setDepth(31));
    }

    const scoreY = hasBonus ? 264 : 248;
    O.push(scene.add.text(VW/2, scoreY, `Score: ${score.toLocaleString()}`, {
      fontFamily:'monospace', fontSize:'22px', color:'#ffffff', stroke:'#000', strokeThickness:2
    }).setOrigin(0.5, 0).setScrollFactor(0).setDepth(31));

    const bestStr = isNewBest ? `★ New Best: ${bestScore.toLocaleString()}` : `Best: ${bestScore.toLocaleString()}`;
    O.push(scene.add.text(VW/2, scoreY+33, bestStr, {
      fontFamily:'monospace', fontSize:'14px', color: isNewBest ? '#FFD700' : '#888888'
    }).setOrigin(0.5, 0).setScrollFactor(0).setDepth(31));

    const btnY = hasBonus ? 352 : 336;
    const isLast = scene.levelLoader.currentIdx >= LEVELS.length - 1;

    const [nb, nt] = this._makeButton(220, btnY, 148, 42,
      isLast ? 'First Level' : 'Next Level', 0xFF8C00, 0xFFAA22, () => {
        scene.time.delayedCall(50, () => scene.levelLoader.loadLevel(scene.levelLoader.currentIdx + 1));
      });
    O.push(nb, nt);

    const [mb, mt] = this._makeButton(400, btnY, 108, 42, 'Menu', 0x334466, 0x4466AA, () => {
      scene.time.delayedCall(50, () => scene.scene.start('MenuScene'));
    });
    O.push(mb, mt);

    const [rb, rt] = this._makeButton(578, btnY, 112, 42, 'Retry', 0x555566, 0x777788, () => {
      scene.time.delayedCall(50, () => scene.levelLoader.loadLevel(scene.levelLoader.currentIdx));
    });
    O.push(rb, rt);
  }

  _showLevelFailed() {
    this._clearOverlay();
    const scene = this.scene;
    scene.inputBlocked = true;
    const O = this._overlayObjects;

    const bg = scene.add.graphics().setScrollFactor(0).setDepth(30);
    bg.fillStyle(0x000000, 0.65); bg.fillRect(0, 0, VW, VH);
    O.push(bg);

    O.push(scene.add.text(VW/2, 182, 'Level Failed', {
      fontFamily:'monospace', fontSize:'36px', color:'#FF3333', stroke:'#000', strokeThickness:4
    }).setOrigin(0.5, 0).setScrollFactor(0).setDepth(31));

    O.push(scene.add.text(VW/2, 241, 'All birds used — no robots destroyed', {
      fontFamily:'monospace', fontSize:'13px', color:'#777777'
    }).setOrigin(0.5, 0).setScrollFactor(0).setDepth(31));

    O.push(scene.add.text(VW/2, 263, `Score: ${this.score.toLocaleString()}`, {
      fontFamily:'monospace', fontSize:'18px', color:'#888888'
    }).setOrigin(0.5, 0).setScrollFactor(0).setDepth(31));

    const [rb, rt] = this._makeButton(VW/2-85, 328, 140, 44, 'Retry', 0xFF3333, 0xFF5555, () => {
      scene.time.delayedCall(50, () => scene.levelLoader.loadLevel(scene.levelLoader.currentIdx));
    });
    O.push(rb, rt);

    const [mb, mt] = this._makeButton(VW/2+85, 328, 120, 44, 'Menu', 0x334466, 0x4466AA, () => {
      scene.time.delayedCall(50, () => scene.scene.start('MenuScene'));
    });
    O.push(mb, mt);
  }

  _makeButton(cx, cy, w, h, label, color, hoverColor, onClick) {
    const scene = this.scene;
    const x = cx-w/2, y = cy-h/2;
    const btn = scene.add.graphics();
    const draw = (col) => { btn.clear(); btn.fillStyle(col); btn.fillRoundedRect(x, y, w, h, 8); };
    draw(color);
    btn.setScrollFactor(0).setDepth(32);
    btn.setInteractive(new Phaser.Geom.Rectangle(x, y, w, h), Phaser.Geom.Rectangle.Contains);
    btn.on('pointerover', () => draw(hoverColor));
    btn.on('pointerout',  () => draw(color));
    btn.on('pointerdown', onClick);
    const txt = scene.add.text(cx, cy, label, {
      fontFamily:'monospace', fontSize:'15px', color:'#ffffff'
    }).setOrigin(0.5, 0.5).setScrollFactor(0).setDepth(33);
    return [btn, txt];
  }

  _clearOverlay() {
    for (const o of this._overlayObjects) { if (o && o.active) o.destroy(); }
    this._overlayObjects = [];
    this.scene.inputBlocked = false;
  }
}

// ─── Trebuchet ────────────────────────────────────────────────────────────────
class Trebuchet {

  constructor(scene) {
    this.scene=scene; this.BASE_X=420; this.BASE_Y=770;
    this.armOffset=0; this.dragging=false; this.dragX=0; this.dragY=0;
    this.MAX_DRAG=120; this.MAX_VEL=22; this.PROJ_FA=CluckAnimal.FA;
    this.LAUNCH_X=0; this.LAUNCH_Y=0;
    this.gfx        = scene.add.graphics().setDepth(5);
    this.overlayGfx = scene.add.graphics().setDepth(8);
    this.draw(); this.setupInput();
  }

  _armAngle() { return -Math.PI*0.78 + this.armOffset; }

  draw() {
    const g=this.gfx; g.clear();
    const bx=this.BASE_X, by=this.BASE_Y, px=bx, py=by-80;
    g.fillStyle(0x3D1F00); g.fillRect(bx-24,by-14,48,14);
    g.lineStyle(5,0x5C3010); g.lineBetween(bx-16,by-14,px,py); g.lineBetween(bx+16,by-14,px,py);
    g.fillStyle(0x777777); g.fillCircle(px,py,5);
    const ang=this._armAngle(), LONG=88, SHORT=26;
    const tipX=px+Math.cos(ang)*LONG, tipY=py+Math.sin(ang)*LONG;
    const cwX=px+Math.cos(ang+Math.PI)*SHORT, cwY=py+Math.sin(ang+Math.PI)*SHORT;
    g.lineStyle(6,0x6B3A10); g.lineBetween(cwX,cwY,tipX,tipY);
    g.fillStyle(0x444444); g.fillRect(cwX-8,cwY-8,16,16);
    g.lineStyle(1,0x666666); g.strokeRect(cwX-8,cwY-8,16,16);
    g.fillStyle(0x8B5E2F); g.fillCircle(tipX,tipY,6);
    this.LAUNCH_X=tipX; this.LAUNCH_Y=tipY;
    const loader = this.scene.levelLoader;
    if (loader && loader.hasMoreBirds && !this.scene.activeAnimal) {
      g.fillStyle(0xF5C542,0.95); g.fillCircle(tipX,tipY,10);
      g.lineStyle(1.5,0xC8950E,0.95); g.strokeCircle(tipX,tipY,10);
      const ba=ang+0.3;
      g.fillStyle(0xFF8C00);
      g.fillTriangle(tipX+Math.cos(ba+0.5)*7,tipY+Math.sin(ba+0.5)*7,
                     tipX+Math.cos(ba)*12,   tipY+Math.sin(ba)*12,
                     tipX+Math.cos(ba-0.5)*7,tipY+Math.sin(ba-0.5)*7);
    }
  }

  setupInput() {
    const scene = this.scene;
    scene.input.on('pointerdown', (ptr) => {
      if (ptr.button !== 0 || scene.inputBlocked) return;
      const dx=ptr.worldX-this.LAUNCH_X, dy=ptr.worldY-this.LAUNCH_Y;
      if (Math.hypot(dx,dy)<60) {
        scene.launcherDragging=true; this.dragging=true;
        this.dragX=ptr.worldX; this.dragY=ptr.worldY;
      }
    });
    scene.input.on('pointermove', (ptr) => {
      if (!this.dragging) return;
      let dx=ptr.worldX-this.LAUNCH_X, dy=ptr.worldY-this.LAUNCH_Y;
      const d=Math.hypot(dx,dy);
      if (d>this.MAX_DRAG) { dx=dx/d*this.MAX_DRAG; dy=dy/d*this.MAX_DRAG; }
      this.dragX=this.LAUNCH_X+dx; this.dragY=this.LAUNCH_Y+dy;
      this.drawOverlay();
    });
    scene.input.on('pointerup', () => {
      if (!this.dragging) return;
      this.dragging=false; scene.launcherDragging=false;
      this.overlayGfx.clear();
      if (!scene.inputBlocked) this.fire();
    });
  }

  _getVelocity() {
    const dx=this.dragX-this.LAUNCH_X, dy=this.dragY-this.LAUNCH_Y;
    const dist=Math.min(Math.hypot(dx,dy),this.MAX_DRAG);
    if (dist<1) return { vx:0, vy:0 };
    const speed=dist/this.MAX_DRAG*this.MAX_VEL, len=Math.hypot(dx,dy);
    return { vx:-(dx/len)*speed, vy:-(dy/len)*speed };
  }

  drawOverlay() {
    const g=this.overlayGfx; g.clear();
    g.lineStyle(2.5,0xFF8800,0.85); g.lineBetween(this.LAUNCH_X,this.LAUNCH_Y,this.dragX,this.dragY);
    const { vx, vy }=this._getVelocity();
    if (Math.hypot(vx,vy)<0.5) return;
    const grav=this.scene.grav, fa=this.PROJ_FA;
    let sx=this.LAUNCH_X, sy=this.LAUNCH_Y, svx=vx, svy=vy;
    const dots=[];
    for (let i=0;i<20;i++) {
      dots.push({x:sx,y:sy});
      for (let j=0;j<3;j++) { svy+=grav; svx*=(1-fa); svy*=(1-fa); sx+=svx; sy+=svy; }
    }
    dots.forEach((d,i)=>{
      const alpha=Phaser.Math.Linear(1.0,0.2,i/(dots.length-1));
      g.fillStyle(0xFFFF00,alpha); g.fillCircle(d.x,d.y,3.5);
    });
  }

  fire() {
    const { vx, vy }=this._getVelocity();
    if (Math.hypot(vx,vy)<0.5 || this.scene.activeAnimal) return;
    const loader=this.scene.levelLoader;
    if (loader && !loader.hasMoreBirds) return;
    if (loader) loader.consumeBird();
    if (this.scene.scoreManager) this.scene.scoreManager.onBirdFired();

    const cluck=new CluckAnimal(this.scene,this.LAUNCH_X,this.LAUNCH_Y);
    cluck.setVelocity(vx,vy);
    this.scene.activeAnimal=cluck;
    this.draw();

    this.scene.tweens.add({
      targets:this, armOffset:1.3, duration:300, ease:'Power3',
      onUpdate:()=>this.draw(),
      onComplete:()=>{
        this.scene.tweens.add({
          targets:this, armOffset:0, duration:250, ease:'Bounce.Out',
          onUpdate:()=>this.draw()
        });
      }
    });

    const cam=this.scene.cameras.main;
    cam.startFollow(cluck.img,false,0.08,0.08);
    this.scene.time.delayedCall(2000,()=>{ cam.stopFollow(); cam.pan(700,500,900,'Sine.easeInOut'); });
  }
}

// ─── MenuScene ────────────────────────────────────────────────────────────────
class MenuScene extends Phaser.Scene {

  constructor() { super('MenuScene'); }

  create() {
    // Background
    const bg = this.add.graphics();
    bg.fillStyle(0x7EC8E3); bg.fillRect(0, 0, VW, VH);
    bg.fillStyle(0x5BACE0, 0.22); bg.fillRect(0, 0, VW, VH * 0.5);

    const fg = this.add.graphics();
    fg.fillStyle(0x6B8F47);
    fg.fillPoints(genHillPts(-10, VW + 10, VH * 0.55, 38, 0.5), true);

    const ng = this.add.graphics();
    ng.fillStyle(0x4A7A2B);
    ng.fillPoints(genHillPts(-10, VW + 10, VH * 0.72, 26, 1.3), true);

    const gr = this.add.graphics();
    gr.fillStyle(0x5C4020); gr.fillRect(0, VH - 22, VW, 22);
    gr.fillStyle(0x3D8020); gr.fillRect(0, VH - 22, VW, 7);

    // Dark overlay for readability
    this.add.graphics().setDepth(1).fillStyle(0x000000, 0.48).fillRect(0, 0, VW, VH);

    // Title
    this.add.text(VW/2, 44, 'FARM FURY', {
      fontFamily:'monospace', fontSize:'52px', color:'#FF8C00',
      stroke:'#000', strokeThickness:6
    }).setOrigin(0.5, 0).setDepth(2);

    this.add.text(VW/2, 108, 'Select a Level', {
      fontFamily:'monospace', fontSize:'17px', color:'#cccccc'
    }).setOrigin(0.5, 0).setDepth(2);

    // Level cards
    const cardW=128, cardH=168, gap=12;
    const totalW = LEVELS.length * cardW + (LEVELS.length - 1) * gap;
    const startX = (VW - totalW) / 2;
    const cardCY = 320;

    LEVELS.forEach((level, i) => {
      const cx = startX + i * (cardW + gap) + cardW / 2;
      this._makeCard(cx, cardCY, cardW, cardH, level, i);
    });

    // Footer hint
    this.add.text(VW/2, VH - 12, 'Click a card to play', {
      fontFamily:'monospace', fontSize:'11px', color:'#777777'
    }).setOrigin(0.5, 1).setDepth(2);
  }

  _makeCard(cx, cy, w, h, level, idx) {
    const x = cx - w/2, y = cy - h/2;
    const stored = getStoredLevel(idx);

    const card = this.add.graphics().setDepth(3);
    const drawCard = (hover) => {
      card.clear();
      card.fillStyle(hover ? 0x3A5A7A : 0x1E2E3E);
      card.fillRoundedRect(x, y, w, h, 10);
      card.lineStyle(2, hover ? 0xFF8C00 : 0x3A5A7A);
      card.strokeRoundedRect(x, y, w, h, 10);
    };
    drawCard(false);

    // Level ID
    this.add.text(cx, y + 16, level.id, {
      fontFamily:'monospace', fontSize:'10px', color:'#7799BB'
    }).setOrigin(0.5, 0.5).setDepth(4);

    // Level name (may wrap)
    this.add.text(cx, y + 34, level.name, {
      fontFamily:'monospace', fontSize:'12px', color:'#FFFFFF',
      wordWrap:{ width: w - 12 }, align:'center'
    }).setOrigin(0.5, 0).setDepth(4);

    // Stars
    const sg = this.add.graphics().setDepth(4);
    for (let s = 0; s < 3; s++) drawStarShape(sg, cx + (s-1)*26, cy - 14, 11, s < stored.stars);

    // Best score
    const scoreStr = stored.score > 0 ? stored.score.toLocaleString() : '—';
    this.add.text(cx, cy + 20, scoreStr, {
      fontFamily:'monospace', fontSize:'12px', color: stored.score > 0 ? '#FFD700' : '#444'
    }).setOrigin(0.5, 0.5).setDepth(4);

    // Par line
    this.add.text(cx, cy + 38, `par: ${level.par_birds} bird${level.par_birds>1?'s':''}`, {
      fontFamily:'monospace', fontSize:'10px', color:'#556677'
    }).setOrigin(0.5, 0.5).setDepth(4);

    // PLAY button strip
    const playBg = this.add.graphics().setDepth(4);
    playBg.fillStyle(0xFF8C00); playBg.fillRoundedRect(x + 10, y + h - 38, w - 20, 28, 6);
    this.add.text(cx, y + h - 24, 'PLAY', {
      fontFamily:'monospace', fontSize:'13px', color:'#fff', stroke:'#000', strokeThickness:2
    }).setOrigin(0.5, 0.5).setDepth(5);

    // Make whole card interactive
    card.setInteractive(new Phaser.Geom.Rectangle(x, y, w, h), Phaser.Geom.Rectangle.Contains);
    card.on('pointerover', () => { drawCard(true); playBg.clear(); playBg.fillStyle(0xFFAA22); playBg.fillRoundedRect(x+10, y+h-38, w-20, 28, 6); });
    card.on('pointerout',  () => { drawCard(false); playBg.clear(); playBg.fillStyle(0xFF8C00); playBg.fillRoundedRect(x+10, y+h-38, w-20, 28, 6); });
    card.on('pointerdown', () => { this.scene.start('SandboxScene', { levelIdx: idx }); });
  }
}

// ─── SandboxScene ─────────────────────────────────────────────────────────────
class SandboxScene extends Phaser.Scene {

  constructor() {
    super('SandboxScene');
    this.grav=1.5; this.blocks=[]; this.robots=[];
    this.launcherDragging=false; this.activeAnimal=null;
    this.inputBlocked=false;
    this._lastShakeTime=0; this._lastThudTime=0;
    this._startLevelIdx=0;
  }

  init(data) {
    this._startLevelIdx = (data && data.levelIdx !== undefined) ? data.levelIdx : 0;
    // Reset mutable state on every scene start
    this.grav=1.5; this.blocks=[]; this.robots=[];
    this.launcherDragging=false; this.activeAnimal=null;
    this.inputBlocked=false; this._lastShakeTime=0; this._lastThudTime=0;
  }

  // ── Texture generation ────────────────────────────────────────────────────

  buildTextures() {
    const w=this.make.graphics({add:false});
    w.fillStyle(0xC4843A); w.fillRect(0,0,60,20); w.lineStyle(1.5,0x7A4218); w.strokeRect(1,1,58,18);
    w.lineStyle(0.8,0x9A5E22,0.55); [15,30,45].forEach(lx=>w.lineBetween(lx,1,lx,19));
    w.generateTexture('wood',60,20); w.destroy();

    const s=this.make.graphics({add:false});
    s.fillStyle(0x888780); s.fillRect(0,0,60,30); s.lineStyle(1.5,0x4E4D4C); s.strokeRect(1,1,58,28);
    s.lineStyle(0.8,0x696867,0.7);
    s.lineBetween(0,15,30,15); s.lineBetween(30,0,30,15); s.lineBetween(30,15,60,15);
    s.lineBetween(15,15,15,30); s.lineBetween(45,0,45,15);
    s.generateTexture('stone',60,30); s.destroy();

    const a=this.make.graphics({add:false});
    a.fillStyle(0xF5C542); a.fillCircle(18,18,17); a.lineStyle(2,0xC8950E); a.strokeCircle(18,18,17);
    a.fillStyle(0x3C2200); a.fillCircle(12,14,2.5); a.fillCircle(24,14,2.5);
    a.lineStyle(1.8,0x3C2200); a.beginPath(); a.arc(18,20,5,0,Math.PI,false); a.strokePath();
    a.generateTexture('animal',36,36); a.destroy();

    const cl=this.make.graphics({add:false});
    cl.fillStyle(0xF5C542); cl.fillCircle(20,20,18); cl.lineStyle(2,0xC8950E); cl.strokeCircle(20,20,18);
    cl.fillStyle(0x000000); cl.fillCircle(14,15,2.5); cl.fillCircle(26,15,2.5);
    cl.fillStyle(0xFF8C00); cl.fillTriangle(26,18,36,22,26,26);
    cl.generateTexture('cluck',40,40); cl.destroy();

    const eg=this.make.graphics({add:false});
    eg.fillStyle(0xFAD55A); eg.fillCircle(8,8,7); eg.lineStyle(1.5,0xE0A020); eg.strokeCircle(8,8,7);
    eg.generateTexture('egg',16,16); eg.destroy();

    const ro=this.make.graphics({add:false});
    ro.fillStyle(0x444441); ro.fillRect(0,0,30,40); ro.lineStyle(1.5,0x636360); ro.strokeRect(1,1,28,38);
    ro.fillStyle(0xE24B4A); ro.fillCircle(9,12,4); ro.fillCircle(21,12,4);
    ro.fillStyle(0xFF8080); ro.fillCircle(9,11,1.5); ro.fillCircle(21,11,1.5);
    ro.lineStyle(1,0x636360,0.8);
    ro.lineBetween(6,26,24,26); ro.lineBetween(6,30,24,30); ro.lineBetween(6,34,24,34);
    ro.generateTexture('robot',30,40); ro.destroy();
  }

  // ── Parallax background ───────────────────────────────────────────────────

  _buildBackground() {
    // Sky — fixed screen-space fill
    const sky = this.add.graphics().setScrollFactor(0).setDepth(-5);
    sky.fillStyle(0x7EC8E3); sky.fillRect(0, 0, VW, VH);
    sky.fillStyle(0x5BACE0, 0.22); sky.fillRect(0, 0, VW, VH * 0.5);

    // Far hills: local coords from -400 to 1400 (covers full scroll range 0-600)
    this._farHillGfx = this.add.graphics().setScrollFactor(0).setDepth(-3);
    this._farHillGfx.fillStyle(0x6B8F47);
    this._farHillGfx.fillPoints(genHillPts(-400, 1400, 336, 38, 0.5), true);

    // Near hills
    this._nearHillGfx = this.add.graphics().setScrollFactor(0).setDepth(-2);
    this._nearHillGfx.fillStyle(0x4A7A2B);
    this._nearHillGfx.fillPoints(genHillPts(-400, 1400, 442, 26, 1.3), true);
  }

  // ── Sound helpers ─────────────────────────────────────────────────────────

  _playThud(impulse) {
    const now = this.time.now;
    if (now - this._lastThudTime < 85) return;
    this._lastThudTime = now;
    try {
      const ctx=this.sound.context, osc=ctx.createOscillator(), gain=ctx.createGain();
      osc.type='sine';
      osc.frequency.value = 75 + Math.random() * 25;
      const vol = Math.min(0.22, impulse / 700);
      gain.gain.setValueAtTime(vol, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.06);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(); osc.stop(ctx.currentTime + 0.06);
    } catch(e) {}
  }

  // ── Scene lifecycle ───────────────────────────────────────────────────────

  create() {
    this.buildTextures();
    this._buildBackground();

    // ── World physics boundaries ──────────────────────────────────────
    this.matter.add.rectangle(WW/2, WH-15, WW+60, 30, { isStatic:true, friction:0.8, restitution:0.05, label:'ground' });
    this.matter.add.rectangle(-15, WH/2, 30, WH+60, { isStatic:true, restitution:0.3 });
    this.matter.add.rectangle(WW+15, WH/2, 30, WH+60, { isStatic:true, restitution:0.3 });

    // ── World visuals (world-space, scroll with camera) ───────────────
    const gv = this.add.graphics().setDepth(1);
    gv.fillStyle(0x5C4020); gv.fillRect(0, WH-32, WW, 32);
    gv.fillStyle(0x3D8020); gv.fillRect(0, WH-32, WW, 7);
    // Subtle grass tufts
    gv.fillStyle(0x4A9528);
    for (let gx = 20; gx < WW; gx += 60) {
      gv.fillTriangle(gx, WH-32, gx+5, WH-40, gx+10, WH-32);
    }

    this.cameras.main.setBounds(0, 0, WW, WH);
    this.cameras.main.setScroll((WW-VW)/2, WH-VH);
    this.matter.world.setGravity(0, this.grav);

    // ── HUD shell ─────────────────────────────────────────────────────
    const topBg = this.add.graphics();
    topBg.fillStyle(0x000000, 0.55); topBg.fillRect(0, 0, VW, 56);
    topBg.setScrollFactor(0).setDepth(19);

    this.fpsText = this.add.text(VW-4, VH-38, 'FPS:--',
      { fontFamily:'monospace', fontSize:'10px', color:'#555555' })
      .setScrollFactor(0).setDepth(20).setOrigin(1,1);

    const botBg = this.add.graphics();
    botBg.fillStyle(0x000000, 0.48); botBg.fillRect(0, VH-26, VW, 26);
    botBg.setScrollFactor(0).setDepth(19);
    this._hintText = this.add.text(VW/2, VH-13, '',
      { fontFamily:'monospace', fontSize:'11px', color:'#e0e0e0' })
      .setScrollFactor(0).setDepth(20).setOrigin(0.5, 0.5);
    this.refreshGravText();

    // ── Collision handler — damage + shake + thud ─────────────────────
    this.matter.world.on('collisionstart', (event) => {
      event.pairs.forEach(({ bodyA, bodyB }) => {
        if (bodyA.isStatic || bodyB.isStatic) return;
        if (bodyA.eggRef   || bodyB.eggRef)   return;
        const relSpeed = Math.hypot(bodyA.velocity.x-bodyB.velocity.x, bodyA.velocity.y-bodyB.velocity.y);
        const effMass  = (bodyA.mass*bodyB.mass)/(bodyA.mass+bodyB.mass);
        const impulse  = relSpeed * effMass * 0.15;
        if (impulse > 5) {
          const dmg = impulse * 0.8;
          if (bodyA.blockRef instanceof Block) bodyA.blockRef.takeDamage(dmg);
          if (bodyB.blockRef instanceof Block) bodyB.blockRef.takeDamage(dmg);
          if (bodyA.robotRef instanceof Robot) bodyA.robotRef.takeDamage(dmg);
          if (bodyB.robotRef instanceof Robot) bodyB.robotRef.takeDamage(dmg);
        }
        // Block thud sound on block-involving impacts
        if (impulse > 14 && (bodyA.blockRef || bodyB.blockRef)) this._playThud(impulse);
        // Screen shake on heavy impacts
        if (impulse > 50) {
          const now = this.time.now;
          if (now - this._lastShakeTime > 180) {
            this._lastShakeTime = now;
            this.cameras.main.shake(150, 0.004);
          }
        }
      });
    });

    // ── Systems ───────────────────────────────────────────────────────
    this.trebuchet    = new Trebuchet(this);
    this.scoreManager = new ScoreManager(this);
    this.levelLoader  = new LevelLoader(this);

    // ── Input ─────────────────────────────────────────────────────────
    this.input.on('pointerdown', (ptr) => {
      if (ptr.button===0 && !this.launcherDragging && !this.activeAnimal && !this.inputBlocked)
        this.spawnWood(ptr.worldX, ptr.worldY);
    });
    this.input.keyboard.on('keydown-S',    () => { const p=this.input.activePointer; this.spawnStone(p.worldX,p.worldY); });
    this.input.keyboard.on('keydown-UP',   () => { this.grav=+(Math.min(5.0,this.grav+0.1)).toFixed(1); this.matter.world.setGravity(0,this.grav); this.refreshGravText(); });
    this.input.keyboard.on('keydown-DOWN', () => { this.grav=+(Math.max(-2.0,this.grav-0.1)).toFixed(1); this.matter.world.setGravity(0,this.grav); this.refreshGravText(); });
    this.input.keyboard.on('keydown-N',    () => { this.levelLoader.loadLevel(this.levelLoader.currentIdx+1); });
    this.input.keyboard.on('keydown-R',    () => { this.levelLoader.loadLevel(this.levelLoader.currentIdx); });
    this.input.keyboard.on('keydown-M',    () => { this.scene.start('MenuScene'); });

    this.levelLoader.loadLevel(this._startLevelIdx);
  }

  shutdown() {
    if (this.scoreManager) this.scoreManager.cleanup();
  }

  // ── Helpers ───────────────────────────────────────────────────────────────

  refreshGravText() {
    const d = this.grav >= 0 ? '▼' : '▲';
    this._hintText.setText(`DRAG=Fire  CLICK=Ability  N=Next  R=Restart  M=Menu  ↑↓ g:${this.grav.toFixed(1)}${d}`);
  }

  refreshBlockText() {}

  removeBlock(block) { const i=this.blocks.indexOf(block); if(i!==-1) this.blocks.splice(i,1); }
  removeRobot(robot) { const i=this.robots.indexOf(robot); if(i!==-1) this.robots.splice(i,1); }

  spawnWood(x,y)   { this.blocks.push(new Block(this,x,y,60,20,'wood')); }
  spawnStone(x,y)  { this.blocks.push(new Block(this,x,y,60,30,'stone')); }
  spawnAnimal(x,y) {
    const img=this.matter.add.image(x,y,'animal');
    img.setCircle(18,{mass:8,restitution:0.3,friction:0.5,frictionAir:0.01});
  }
  spawnRobot(x,y)  { this.robots.push(new Robot(this,x,y)); }

  update(time, delta) {
    if (delta > 0) this.fpsText.setText(`FPS:${Math.round(1000/delta)}`);

    // Parallax scroll (X-axis only, camera Y handled by fixed screen position)
    const sx = this.cameras.main.scrollX;
    this._farHillGfx.setPosition(-sx * 0.12, 0);
    this._nearHillGfx.setPosition(-sx * 0.35, 0);

    for (const b of this.blocks) b.sync();
    for (const r of this.robots) r.sync();
    if (this.scoreManager) this.scoreManager.update();
  }
}

// ─────────────────────────────────────────────────────────────────────────────
new Phaser.Game({
  type: Phaser.AUTO,
  width: VW, height: VH,
  backgroundColor: '#7EC8E3',
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH,
  },
  physics: { default:'matter', matter:{ gravity:{ y:1.5 }, debug:false } },
  scene: [MenuScene, SandboxScene],
});
</script>
</body>
</html>
